<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FXManager Taskpane</title>

    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
            color: #333;
        }

        h2 {
            font-size: 16px;
            margin-bottom: 20px;
            color: #217346;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 14px;
        }

        .combo-wrapper {
            position: relative;
        }

        .combo-wrapper input[type="text"] {
            width: 100%;
            padding: 8px 32px 8px 8px;
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .combo-wrapper input[type="text"]:focus {
            outline: none;
            border-color: #217346;
        }

        .dropdown-arrow {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: #666;
            font-size: 12px;
        }

        .dropdown-list {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            max-height: 180px;
            overflow-y: auto;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0 0 4px 4px;
            background: #fff;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }

        .dropdown-list.open {
            display: block;
        }

        .dropdown-item {
            padding: 8px 10px;
            cursor: pointer;
            font-size: 13px;
        }

        .dropdown-item:hover,
        .dropdown-item.active {
            background-color: #e8f5ee;
        }

        .btn {
            background-color: #217346;
            color: white;
            padding: 10px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            font-size: 14px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #1e6b41;
        }

        .status-box {
            background-color: #f3f2f1;
            padding: 10px;
            border: 1px solid #e1dfdd;
            border-radius: 4px;
            font-size: 12px;
            margin-top: 5px;
            word-wrap: break-word;
        }

        .version-badge {
            display: inline-block;
            font-size: 11px;
            color: #888;
            background: #f0f0f0;
            border-radius: 3px;
            padding: 1px 6px;
            margin-left: 6px;
            vertical-align: middle;
            font-weight: normal;
        }
    </style>
</head>

<body>

    <h2>FXManager (환율 로더)<span class="version-badge" id="app-version"></span></h2>

    <div class="section">
        <label>통화 코드</label>
        <div class="combo-wrapper" id="combo-wrapper">
            <input type="text" id="currency-input" placeholder="USD 입력 또는 선택" autocomplete="off">
            <span class="dropdown-arrow">▼</span>
            <div class="dropdown-list" id="dropdown-list"></div>
        </div>
    </div>

    <div class="section">
        <label>1. 날짜 범위 지정</label>
        <button id="btn-set-date" class="btn">현재 선택한 범위로 지정</button>
        <div class="status-box" id="date-range-address">선택 안됨</div>
    </div>

    <div class="section">
        <label>2. 결과 출력 범위 지정</label>
        <button id="btn-set-target" class="btn">현재 선택한 범위로 지정</button>
        <div class="status-box" id="target-range-address">선택 안됨</div>
    </div>

    <div class="section" style="margin-top: 30px;">
        <button id="btn-run" class="btn" style="background-color: #0078d4;">환율 정보 가져오기</button>
    </div>

    <script type="text/javascript" src="taskpane.js"></script>

    <script>
        // 커스텀 드롭다운 로직
        let allCurrencies = [];
        let activeIndex = -1;

        const input = document.getElementById("currency-input");
        const dropdownList = document.getElementById("dropdown-list");
        const comboWrapper = document.getElementById("combo-wrapper");

        function renderDropdown(items) {
            dropdownList.innerHTML = "";
            activeIndex = -1;
            if (items.length === 0) {
                dropdownList.classList.remove("open");
                return;
            }
            items.forEach((item, i) => {
                const div = document.createElement("div");
                div.className = "dropdown-item";
                div.textContent = `${item.code}  ${item.name}`;
                div.addEventListener("mousedown", (e) => {
                    e.preventDefault();
                    input.value = item.code;
                    dropdownList.classList.remove("open");
                });
                dropdownList.appendChild(div);
            });
            dropdownList.classList.add("open");
        }

        input.addEventListener("input", () => {
            const q = input.value.trim().toUpperCase();
            if (!q) {
                renderDropdown(allCurrencies);
                return;
            }
            const filtered = allCurrencies.filter(c =>
                c.code.includes(q) || c.name.includes(q)
            );
            renderDropdown(filtered);
        });

        input.addEventListener("focus", () => {
            const q = input.value.trim().toUpperCase();
            const filtered = q
                ? allCurrencies.filter(c => c.code.includes(q) || c.name.includes(q))
                : allCurrencies;
            renderDropdown(filtered);
        });

        input.addEventListener("blur", () => {
            setTimeout(() => dropdownList.classList.remove("open"), 150);
        });

        input.addEventListener("keydown", (e) => {
            const items = dropdownList.querySelectorAll(".dropdown-item");
            if (e.key === "ArrowDown") {
                activeIndex = Math.min(activeIndex + 1, items.length - 1);
            } else if (e.key === "ArrowUp") {
                activeIndex = Math.max(activeIndex - 1, 0);
            } else if (e.key === "Enter" && activeIndex >= 0) {
                items[activeIndex].dispatchEvent(new Event("mousedown"));
                e.preventDefault();
                return;
            } else if (e.key === "Escape") {
                dropdownList.classList.remove("open");
                return;
            }
            items.forEach((el, i) => el.classList.toggle("active", i === activeIndex));
            if (items[activeIndex]) items[activeIndex].scrollIntoView({ block: "nearest" });
        });

        // taskpane.js의 loadCurrencies가 allCurrencies를 채워줌
        window.setCurrencyList = function(list) {
            allCurrencies = list;
        };
    </script>

</body>

</html>
